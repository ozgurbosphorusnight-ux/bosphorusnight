name: Daily Rebuild

# Triggers a fresh Vercel build every day so the Event schema's startDate
# (tomorrow 20:30 Istanbul) never goes stale for Google, and Google reviews,
# llms.txt and every page stay fresh daily.
# Also runnable on-demand via the Actions tab.

on:
  schedule:
    - cron: '0 3 * * *'  # Every day 03:00 UTC = 06:00 Istanbul
  workflow_dispatch:

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK secret is missing"
            exit 1
          fi
          curl -fsSL -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Deploy hook triggered."
