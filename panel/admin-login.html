<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Paneli — Giriş</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        navy: { dark: '#0b1120', DEFAULT: '#101a30', light: '#152240' },
        gold: { DEFAULT: '#c9a84c', light: '#d4b86a', dark: '#b8953f' },
      }}}
    }
  </script>
</head>
<body class="bg-navy-dark min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gold">BOSPHORUS NIGHT</h1>
      <p class="text-white/50 text-sm mt-1">Admin Paneli</p>
    </div>
    <div class="bg-navy-light rounded-2xl p-6 border border-white/10">
      <h2 class="text-white text-lg font-semibold mb-4">Admin Giriş</h2>
      <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg p-3 mb-4"></div>
      <div class="mb-4">
        <label class="text-white/60 text-sm mb-1 block">Kullanıcı Adı</label>
        <input id="username" type="text" placeholder="Kullanıcı adınız"
          class="w-full bg-navy-dark border border-white/10 rounded-lg px-4 py-3 text-white placeholder-white/30 focus:border-gold focus:outline-none">
      </div>
      <div class="mb-6">
        <label class="text-white/60 text-sm mb-1 block">Şifre</label>
        <input id="password" type="password" placeholder="Şifrenizi girin"
          class="w-full bg-navy-dark border border-white/10 rounded-lg px-4 py-3 text-white placeholder-white/30 focus:border-gold focus:outline-none">
      </div>
      <button onclick="login()" id="loginBtn"
        class="w-full bg-gold hover:bg-gold-dark text-navy-dark font-semibold py-3 rounded-lg transition-colors">Giriş</button>
    </div>
  </div>
  <script>
    if (localStorage.getItem('admin_token')) window.location.href = '/panel/admin.html';

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');
      errorMsg.classList.add('hidden');
      if (!username || !password) { errorMsg.textContent = 'Kullanıcı adı ve şifre gerekli.'; errorMsg.classList.remove('hidden'); return; }
      btn.textContent = 'Giriş yapılıyor...'; btn.disabled = true;
      try {
        const res = await fetch('/api/panel/admin-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_name', data.name);
          localStorage.setItem('admin_role', data.role);
          window.location.href = '/panel/admin.html';
        } else {
          errorMsg.textContent = data.error || 'Hatalı giriş.'; errorMsg.classList.remove('hidden');
        }
      } catch (e) { errorMsg.textContent = 'Bağlantı hatası.'; errorMsg.classList.remove('hidden'); }
      btn.textContent = 'Giriş'; btn.disabled = false;
    }
    document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
